name: Extension Release

on:
  push:
    tags:
      - 'extension-v*'

# Tag → release flow:
#   1. git tag extension-v0.1.0 && git push origin extension-v0.1.0
#   2. This workflow builds, zips, and attaches the zip to a GitHub release.
#
# Tag version must match chrome-extension/public/manifest.json's `version`
# field — the workflow fails loudly otherwise so mismatched releases don't
# ship. To publish automatically to the Chrome Web Store, add a job that
# uses the `anitrack-extension.zip` artifact with chrome-webstore-upload-cli
# once the extension is listed and you have CWS API credentials configured
# as repository secrets.

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#extension-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        working-directory: chrome-extension
        run: |
          MANIFEST_VERSION=$(node -p "require('./public/manifest.json').version")
          EXPECTED="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$EXPECTED" ]; then
            echo "::error::Tag version ($EXPECTED) does not match manifest version ($MANIFEST_VERSION)."
            echo "Update chrome-extension/public/manifest.json before tagging."
            exit 1
          fi
          echo "Manifest version $MANIFEST_VERSION matches tag."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: chrome-extension/package-lock.json

      - name: Install dependencies
        working-directory: chrome-extension
        run: npm ci

      - name: Build extension
        working-directory: chrome-extension
        run: npm run build

      - name: Package extension
        working-directory: chrome-extension
        run: |
          ARTIFACT="anitrack-extension-${{ steps.version.outputs.version }}.zip"
          cd dist
          zip -r "../$ARTIFACT" .
          echo "ARTIFACT_PATH=chrome-extension/$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: anitrack-extension-${{ steps.version.outputs.version }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Chrome Extension ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: ${{ env.ARTIFACT_PATH }}
